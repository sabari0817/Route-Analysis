<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Include marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --accent-primary: #2563eb;
            --accent-hover: #1d4ed8;
            --text-primary: #0f172a;
            --text-secondary: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            max-width: 700px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            background: var(--card-bg);
            padding: 0.5rem;
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
        }

        button {
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: var(--accent-primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-bottom-color: var(--accent-primary);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin: 3rem auto;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-container {
            display: none;
            width: 100%;
            max-width: 900px;
            margin-top: 1rem;
        }

        .error-msg {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
            text-align: center;
            width: 100%;
            max-width: 700px;
            font-weight: 500;
        }

        /* Markdown Typography Styles for User Friendly UI */
        .report-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 3rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .prose {
            line-height: 1.75;
            color: var(--text-primary);
            font-size: 1.05rem;
        }

        .prose p {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
        }

        .prose h1, .prose h2, .prose h3 {
            color: var(--text-primary);
            font-weight: 700;
            margin-top: 2em;
            margin-bottom: 1em;
            line-height: 1.3;
        }

        .prose h1 { font-size: 2.25rem; }
        .prose h2 { font-size: 1.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
        .prose h3 { font-size: 1.25rem; }
        
        .prose strong {
            font-weight: 600;
            color: #111827;
        }

        .prose ul, .prose ol {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
            padding-left: 1.625em;
        }

        .prose li {
            margin-top: 0.5em;
            margin-bottom: 0.5em;
        }

        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2em;
            margin-bottom: 2em;
        }

        .prose th, .prose td {
            border: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            text-align: left;
        }

        .prose th {
            background-color: #f1f5f9;
            font-weight: 600;
        }
        
        .copy-btn-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        
        .copy-btn {
            background: #e2e8f0;
            color: #475569;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .copy-btn:hover {
            background: #cbd5e1;
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Route Analysis</h1>
        <p>Demographic & transport route intelligence</p>
    </div>

    <div class="search-container">
        <input type="text" id="routeInput" placeholder="Enter route (e.g., Delhi to Agra)" />
        <button id="searchBtn">Analyze Route</button>
    </div>

    <div class="loader" id="loader"></div>
    <div class="error-msg" id="errorMsg"></div>

    <div class="results-container" id="resultsContainer">
        <!-- Results will be injected here via JavaScript -->
    </div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', analyzeRoute);
        document.getElementById('routeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') analyzeRoute();
        });

        async function analyzeRoute() {
            const query = document.getElementById('routeInput').value.trim();
            if (!query) return;

            // UI State updates
            const container = document.getElementById('resultsContainer');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');
            const searchBtn = document.getElementById('searchBtn');

            container.style.display = 'none';
            container.innerHTML = '';
            errorMsg.style.display = 'none';
            loader.style.display = 'block';
            searchBtn.disabled = true;

            try {
                const response = await fetch(`/testing/?route=${encodeURIComponent(query)}`);
                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error);
                }

                renderResults(result.data);

            } catch (err) {
                errorMsg.textContent = "Error: " + err.message;
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        function renderResults(data) {
            if (!data) return;
            const container = document.getElementById('resultsContainer');
            
            // Format the text using marked.js to make it look like a beautiful report
            // We'll process the data slightly so the "1. Section" lines act as h2 headers
            
            // Convert "1. Something" to "## 1. Something" so markdown renders it as headers
            let processedData = data.replace(/^(\d+\.\s+.*)$/gm, '## $1');
            
            // Convert "ROUTE NAME: ..." to "<h1>ROUTE NAME: ...</h1>"
            processedData = processedData.replace(/^(ROUTE NAME:.*)$/m, '# $1');

            const htmlContent = marked.parse(processedData);

            container.innerHTML = `
                <div class="copy-btn-container">
                    <button class="copy-btn" onclick="copyRawText()">📋 Copy Raw Text</button>
                </div>
                <div class="report-card prose">
                    ${htmlContent}
                </div>
            `;
            
            // Store raw text for copying
            window.rawLLMText = data;
            
            container.style.display = 'block';
        }
        
        function copyRawText() {
            if (window.rawLLMText) {
                navigator.clipboard.writeText(window.rawLLMText).then(() => {
                    const btn = document.querySelector('.copy-btn');
                    btn.textContent = '✅ Copied!';
                    setTimeout(() => btn.textContent = '📋 Copy Raw Text', 2000);
                });
            }
        }
    </script>
</body>
</html>
